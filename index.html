<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Dino Habitat</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            width: 900px;
            height: 550px;
            background: linear-gradient(to bottom, #bae6fd, #e0f2fe);
            position: relative;
            overflow: hidden;
            border: 6px solid #334155;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        
        /* Smooth Cartoon Clouds */
        .cloud {
            position: absolute;
            background: #ffffff;
            border-radius: 50px;
            opacity: 0.9;
            animation: drift linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
        }
        .cloud-1 { width: 140px; height: 45px; top: 50px; left: -200px; animation-duration: 40s; }
        .cloud-2 { width: 200px; height: 60px; top: 100px; left: -250px; animation-duration: 60s; }
        @keyframes drift {
            0% { transform: translateX(0); }
            100% { transform: translateX(1200px); }
        }

        /* Ground */
        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: #4ade80;
            border-top: 8px solid #22c55e;
            z-index: 2;
        }
        .grass-tuft {
            position: absolute;
            bottom: 114px;
            width: 8px;
            height: 22px;
            background: #16a34a;
            border-radius: 4px;
            transform-origin: bottom center;
            animation: sway 3s ease-in-out infinite alternate;
            z-index: 2;
        }
        @keyframes sway {
            0% { transform: skewX(-6deg); }
            100% { transform: skewX(10deg); }
        }

        /* Adopt Me Style Dino Character */
        #dino {
            position: absolute;
            width: 140px;
            height: 140px;
            bottom: 95px;
            left: 380px;
            cursor: grab;
            z-index: 10;
            transform-origin: bottom center;
        }
        #dino.idle { animation: dino-plush-breathe 2s ease-in-out infinite; }
        #dino.walking { animation: dino-plush-bounce 0.5s infinite ease-in-out; }
        #dino.dragging { cursor: grabbing; animation: dino-plush-panic 0.15s infinite alternate ease-in-out; }
        
        .dino-sprite {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
        }

        /* Cartoon Soft Squash/Stretch Animations */
        @keyframes dino-plush-breathe {
            0%, 100% { transform: scale(1, 1); }
            50% { transform: scale(1.04, 0.96); }
        }
        @keyframes dino-plush-bounce {
            0%, 100% { transform: translateY(0) scale(1, 1) rotate(0deg); }
            50% { transform: translateY(-14px) scale(0.96, 1.05) rotate(2deg); }
        }
        @keyframes dino-plush-panic {
            0% { transform: scale(0.95) rotate(-4deg); }
            100% { transform: scale(1.05) rotate(4deg); }
        }

        /* Custom Habitat Drag Items */
        .placed-item {
            position: absolute;
            bottom: 105px;
            font-size: 42px;
            z-index: 5;
            cursor: move;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.1));
            transition: transform 0.1s;
        }
        .placed-item:hover { transform: scale(1.2); }
        .placed-item.dragging-item { opacity: 0.7; transform: scale(1.3); }

        /* Speech Bubble */
        #speech-bubble {
            position: absolute;
            background: white;
            border: 3px solid #334155;
            border-radius: 16px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            color: #1e293b;
            max-width: 220px;
            display: none;
            z-index: 40;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15));
        }
        #speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 30px;
            border-width: 12px 12px 0;
            border-style: solid;
            border-color: white transparent;
            display: block;
            width: 0;
        }

        /* UI Screens */
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
        }
        .menu-box {
            background: #1e293b;
            border: 4px solid #f8fafc;
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
        }
        input[type="text"] {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            background: #334155;
            color: white;
            margin-bottom: 20px;
            width: 100%;
            text-align: center;
        }
        button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            border-bottom: 4px solid #16a34a;
        }
        button:active {
            border-bottom: 0;
            transform: translateY(4px);
        }
        .dino-choice {
            display: inline-block;
            margin: 10px;
            padding: 15px;
            border: 3px dashed #64748b;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
        }
        .dino-choice.selected {
            border-color: #22c55e;
            background: #334155;
            transform: scale(1.05);
        }

        /* HUD Panels */
        #stats-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(15, 23, 42, 0.75);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid #475569;
            z-index: 30;
            backdrop-filter: blur(4px);
        }
        #reset-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ef4444;
            border-bottom: 3px solid #b91c1c;
            font-size: 12px;
            padding: 8px 14px;
            z-index: 30;
        }
        #shop-panel {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            padding: 12px 25px;
            border-radius: 16px;
            border: 2px solid #64748b;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 30;
        }
        .shop-title {
            color: #94a3b8;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .shop-btn {
            background: #334155;
            border-bottom: 3px solid #1e293b;
            font-size: 13px;
            padding: 8px 14px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div id="ground"></div>
    <div id="speech-bubble"></div>

    <div id="dino" class="idle">
        <div class="dino-sprite" id="dino-render"></div>
    </div>

    <div id="stats-panel" style="display:none;">
        ✨ <span id="display-name">Dino</span> the <span id="display-type">Type</span> | Stage: <span id="display-age">Baby</span>
    </div>
    <button id="reset-btn" style="display:none;" onclick="resetGame()">Reset Pet</button>
    
    <div id="shop-panel" style="display:none;">
        <div class="shop-title">Habitat Items:</div>
        <button class="shop-btn" onclick="spawnItem('🌸')">🌸 Flower</button>
        <button class="shop-btn" onclick="spawnItem('🔥')">🔥 Fire Pit</button>
        <button class="shop-btn" onclick="spawnItem('🌳')">🌳 Tree</button>
    </div>

    <div id="setup-screen" class="ui-screen">
        <div class="menu-box">
            <h2>Hatch a Dino Partner</h2>
            <p>Choose a companion species:</p>
            <div>
                <div class="dino-choice selected" onclick="selectType('T-Rex', this)">🦖 T-Rex</div>
                <div class="dino-choice" onclick="selectType('Brachiosaurus', this)">🦕 Brach</div>
                <div class="dino-choice" onclick="selectType('Triceratops', this)">🛡️ Triceratops</div>
            </div>
            <p>Name your dinosaur:</p>
            <input type="text" id="dino-name-input" value="Little Foot" maxlength="12">
            <button onclick="startGame()">HATCH EGG</button>
        </div>
    </div>
</div>
